<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini AI Assistant</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    width: 90%;
    max-width: 700px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.input-area {
    display: flex;
    gap: 10px;
}

#input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

#submit {
    padding: 12px 20px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

#submit:hover {
    background: #5566d6;
}

#response {
    margin-top: 20px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 8px;
    min-height: 80px;
    line-height: 1.5;
}

.loading {
    color: gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Gemini AI Assistant</h1>

<div class="input-area">
<input type="text" id="input" placeholder="Ask something...">
<button id="submit">Ask</button>
</div>

<div id="response">AI response will appear here...</div>

</div>

<script>

document.getElementById('submit').addEventListener('click', async () => {

const prompt = document.getElementById('input').value.trim();
const responseDiv = document.getElementById('response');

if (!prompt) {
    responseDiv.textContent = "Please enter a question";
    return;
}

responseDiv.innerHTML = '<span class="loading">Thinking...</span>';

try {

const API_KEY = "AIzaSyDwXXG6XwxYrq7iM70MUZdvKiFIwJEcJCQ";

const SYSTEM_PROMPT = `You are an intelligent problem-solving assistant.

Your task is to analyze any question asked by the user and clearly explain the problem and its solution.

Guidelines:
1. Understand the user's question carefully.
2. Convert the question into a clear problem statement.
3. Provide a practical solution to the problem.
4. Explain why the solution works.
5. Also explain how Artificial Intelligence can be used to solve or improve this problem.
6. Keep the answer within 50 words.
7. Present the answer in bullet points.

Structure your response like this:

Problem Statement:
- Explain what the problem is.

Solution:
- Step 1
- Step 2
- Step 3

How AI Can Help:
- Explain how AI can help solve or improve this problem.

Explanation:
- Brief reason why this solution works.

User question: {question}
`;

const requestBody = {
system_instruction: {
    parts: [{ text: SYSTEM_PROMPT }]
},
contents: [
    {
        parts: [
            { text: prompt }
        ]
    }
]
};

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify(requestBody)
}
);

if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
}

const data = await response.json();

const responseText =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "No response received";

responseDiv.textContent = responseText;

} catch (error) {

responseDiv.textContent = "Error: " + error.message;

}

});

</script>

</body>
</html>
